<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Inicio sesion</title>
  <link rel="stylesheet" href="./css/sesion.css">

 </head>
 <body>
  <header>Bienvenido a
    <h3>!Natural Novo</h3>
  </header>
  <!-- Botón para abrir el formulario modal -->
  <button    class="btn"  id="openBtn">Registrar</button>

  <!-- Estructura del Formulario Modal -->
  <dialog id="modalForm">
    <div class="modal-header">
      <h3>Contacto Corto</h3>
      <button id="closeBtn" aria-label="Cerrar">&times;</button>
    </div>
    
    <form  id="formContent">
      <div class="input-group">
        <label for="name">Nombre:</label>
        <input type="text" id="name" required placeholder="Tu nombre">
      </div>
      
      <div class="input-group">
        <label for="email">Correo:</label>
        <input type="email" id="email" required placeholder="correo@ejemplo.com">
      </div>
      
      <button type="submit" class="submit-btn">Enviar Datos</button>
    </form>
  </dialog>

  
  <script src="/js/sesion.js"></script>
</body>
</html>
