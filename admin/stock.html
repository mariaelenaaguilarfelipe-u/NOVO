<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Stock</title>
    <link rel="stylesheet" href="./css/stock.css">
  
</head>
<body>
    
    <section id="seccion-admin">
        <h1>Control de Stock</h1>
        <a class="volver-admin" href="panel.html">Volver al panel</a>
        <div class="stock-overview">
            <span class="stock-numero">28 productos en inventario</span>
            <span class="stock-critico">3 productos en riesgo</span>
        </div>
        <div id="alertas"></div>
        <table id="tabla-inventario">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Stock</th>
                    <th>Precio</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla"></tbody>
        </table>
    </section>

    <script src="../js/stock.js"></script>
</body>
</html>
